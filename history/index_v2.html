<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中台支撑资源库</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<!-- 顶部导航栏 -->
<header class="top-header">
  <div class="header-left">
    <div class="logo">
      <i class="fas fa-database"></i>
      <span>中台支撑资源库</span>
    </div>
  </div>
  <div class="header-center">
    <div class="global-search">
      <i class="fas fa-search"></i>
      <input type="text" id="globalSearch" placeholder="搜索资源名称、关键词..." autocomplete="off">
      <kbd>Ctrl+K</kbd>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-upload-header" id="btnUploadHeader">
      <i class="fas fa-cloud-upload-alt"></i> 上传资源
    </button>
    <div class="notification" id="notificationBtn">
      <i class="fas fa-bell"></i>
      <span class="badge" id="notifBadge">0</span>
      <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-dropdown-header">
          <span>通知消息</span>
          <button class="notif-clear-btn" id="notifClearBtn">全部已读</button>
        </div>
        <div class="notif-dropdown-body" id="notifBody">
          <div class="notif-empty">暂无新通知</div>
        </div>
      </div>
    </div>
    <div class="user-avatar" id="userAvatarBtn"></div>
  </div>
</header>

<div class="main-container">
  <!-- 左侧导航栏 - 由JS动态渲染 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3><i class="fas fa-folder-tree"></i> 产品资料</h3>
    </div>
    <nav class="sidebar-nav">
      <ul class="nav-tree" id="navTree">
        <!-- 由config.js + app.js动态生成 -->
      </ul>
    </nav>
  </aside>

  <div class="content-wrapper">
    <!-- 书架标签 - 由JS动态渲染 -->
    <div class="tabs-bar">
      <div class="tabs" id="tabsBar">
        <!-- 由JS动态生成 -->
      </div>
      <div class="breadcrumb">
        <span><i class="fas fa-home"></i> 首页</span>
        <i class="fas fa-chevron-right"></i>
        <span class="current" id="breadcrumbCurrent">全部资源</span>
      </div>
    </div>

    <!-- Banner 轮播区 -->
    <div class="banner-section">
      <div class="banner-carousel" id="bannerCarousel">
        <div class="banner-track" id="bannerTrack">
          <!-- 由JS动态生成 -->
        </div>
        <button class="banner-arrow banner-prev" id="bannerPrev"><i class="fas fa-chevron-left"></i></button>
        <button class="banner-arrow banner-next" id="bannerNext"><i class="fas fa-chevron-right"></i></button>
        <div class="banner-dots" id="bannerDots"></div>
      </div>
      <div class="banner-recent" id="bannerRecent">
        <div class="recent-header">
          <i class="fas fa-clock"></i> 最新上传
        </div>
        <div class="recent-list" id="recentList">
          <div class="recent-empty">暂无上传记录</div>
        </div>
      </div>
    </div>

    <!-- 筛选面板 + 内容区 -->
    <div class="content-body">
      <!-- 右侧筛选面板 - 由JS动态渲染 -->
      <aside class="filter-panel" id="filterPanel">
        <div class="filter-section">
          <h4 class="filter-title">
            <i class="fas fa-tags"></i> 资料类别
            <i class="fas fa-chevron-down toggle"></i>
          </h4>
          <div class="filter-body" id="filterCategories">
            <!-- 由JS动态生成 -->
          </div>
        </div>
        <div class="filter-section">
          <h4 class="filter-title">
            <i class="fas fa-file"></i> 文件格式
            <i class="fas fa-chevron-down toggle"></i>
          </h4>
          <div class="filter-body" id="filterFormats">
            <!-- 由JS动态生成 -->
          </div>
        </div>
        <button class="filter-reset-btn" id="btnResetFilter">
          <i class="fas fa-rotate-left"></i> 重置筛选
        </button>
      </aside>

      <!-- 资源列表 -->
      <main class="resource-main">
        <div class="resource-toolbar">
          <div class="toolbar-left">
            <span class="result-info">
              筛选出 <strong id="resultCount">0</strong> 条结果
            </span>
          </div>
          <div class="toolbar-right">
            <div class="sort-select">
              <i class="fas fa-arrow-down-wide-short"></i>
              <select id="sortSelect">
                <option value="newest">最新上传</option>
                <option value="downloads">下载最多</option>
                <option value="name">名称排序</option>
              </select>
            </div>
            <div class="view-toggle">
              <button class="view-btn active" data-view="list" title="列表视图">
                <i class="fas fa-list"></i>
              </button>
              <button class="view-btn" data-view="grid" title="网格视图">
                <i class="fas fa-grip"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="resource-list" id="resourceList">
          <!-- 由JS动态渲染 -->
        </div>

        <div class="load-more">
          <div class="pagination-info">
            显示 0 / 共 0 条
          </div>
          <button class="btn-load-more" id="btnLoadMore">加载更多</button>
        </div>
      </main>
    </div>
  </div>
</div>

<!-- 上传弹窗 -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal-container upload-modal">
    <div class="modal-header">
      <h3><i class="fas fa-cloud-upload-alt"></i> 上传资源</h3>
      <button class="modal-close" onclick="closeModal('uploadModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="upload-zone" id="uploadZone">
        <i class="fas fa-cloud-arrow-up"></i>
        <p>拖拽文件到此处，或 <label for="fileInput" class="upload-link">点击选择文件</label></p>
        <span>支持 PDF、Word、Excel、PPT、视频、图片、压缩包等格式</span>
        <input type="file" id="fileInput" multiple hidden>
      </div>
      <div class="upload-file-list" id="uploadFileList"></div>
      <div class="upload-form">
        <div class="form-row">
          <div class="form-group">
            <label>资源名称 <span class="required">*</span></label>
            <input type="text" id="uploadName" placeholder="输入资源名称">
          </div>
          <div class="form-group">
            <label>版本号</label>
            <input type="text" id="uploadVersion" placeholder="如 V2.0.0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>所属产品 <span class="required">*</span></label>
            <select id="uploadProduct">
              <option value="">请选择产品</option>
              <!-- 由JS动态生成 -->
            </select>
          </div>
          <div class="form-group">
            <label>资料类别 <span class="required">*</span></label>
            <select id="uploadCategory">
              <option value="">请选择类别</option>
              <!-- 由JS动态生成 -->
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>书架归属 <span class="required">*</span></label>
            <select id="uploadShelf">
              <option value="">请选择书架</option>
              <!-- 由JS动态生成 -->
            </select>
          </div>
          <div class="form-group">
            <label>文件格式</label>
            <select id="uploadFormat">
              <option value="">自动识别</option>
              <!-- 由JS动态生成 -->
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>存储路径</label>
          <input type="text" id="uploadPath" placeholder="/resources/" readonly>
        </div>
        <div class="form-group">
          <label>资源描述</label>
          <textarea id="uploadDesc" rows="3" placeholder="简要描述资源内容..."></textarea>
        </div>
        <div class="form-group">
          <label>标签</label>
          <div class="tag-input-wrapper" id="tagInputWrapper">
            <div class="tag-list" id="tagList"></div>
            <input type="text" id="tagInput" placeholder="输入标签后按回车添加">
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('uploadModal')">取消</button>
      <button class="btn-primary" id="btnSubmitUpload"><i class="fas fa-upload"></i> 确认上传</button>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-container detail-modal">
    <div class="modal-header">
      <h3 id="detailTitle">资源详情</h3>
      <button class="modal-close" onclick="closeModal('detailModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('detailModal')">关闭</button>
      <button class="btn-primary" id="btnDetailDownload"><i class="fas fa-download"></i> 下载资源</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
