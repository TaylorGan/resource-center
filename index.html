<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>捷顺科技 · 中台支撑资源库</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<!-- 顶部导航栏 -->
<header class="top-header">
  <div class="header-left">
    <a class="logo" href="index.html">
      <svg class="logo-icon" viewBox="0 0 36 36" width="32" height="32">
        <defs>
          <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2563EB"/>
            <stop offset="100%" style="stop-color:#60A5FA"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="32" height="32" rx="8" fill="url(#lg1)"/>
        <path d="M11,12 h14 M11,18 h10 M11,24 h12" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="logo-text">
        <span class="logo-main">捷顺科技</span>
        <span class="logo-sub">中台支撑资源库</span>
      </div>
    </a>
  </div>
  <div class="header-center">
    <div class="global-search">
      <i class="fas fa-search"></i>
      <input type="text" id="globalSearch" placeholder="搜索资源名称、关键词、标签..." autocomplete="off">
      <kbd>⌘K</kbd>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-upload-header" id="btnUploadHeader">
      <i class="fas fa-cloud-upload-alt"></i>
      <span>上传资源</span>
    </button>
    <div class="header-divider"></div>
    <div class="notification" id="notificationBtn">
      <i class="fas fa-bell"></i>
      <span class="badge" id="notifBadge">0</span>
      <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-dropdown-header">
          <span>通知消息</span>
          <button class="notif-clear-btn" id="notifClearBtn">全部已读</button>
        </div>
        <div class="notif-dropdown-body" id="notifBody">
          <div class="notif-empty"><i class="fas fa-bell-slash"></i><p>暂无新通知</p></div>
        </div>
      </div>
    </div>
    <div class="user-avatar" id="userAvatarBtn"></div>
  </div>
</header>

<div class="main-container">
  <!-- 左侧导航栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-search">
      <i class="fas fa-search"></i>
      <input type="text" id="sidebarSearch" placeholder="筛选分类...">
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-title">产品资料</div>
      <ul class="nav-tree" id="navTree"></ul>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-stats">
        <div class="stat-item"><span class="stat-num" id="statTotal">0</span><span class="stat-label">总资源</span></div>
        <div class="stat-item"><span class="stat-num" id="statToday">0</span><span class="stat-label">今日新增</span></div>
      </div>
    </div>
  </aside>

  <div class="content-wrapper">
    <!-- 书架标签 + 面包屑 -->
    <div class="tabs-bar">
      <div class="tabs" id="tabsBar"></div>
    </div>

    <!-- Banner 轮播 -->
    <div class="banner-section">
      <div class="banner-carousel" id="bannerCarousel">
        <div class="banner-track" id="bannerTrack"></div>
        <button class="banner-arrow banner-prev" id="bannerPrev"><i class="fas fa-chevron-left"></i></button>
        <button class="banner-arrow banner-next" id="bannerNext"><i class="fas fa-chevron-right"></i></button>
        <div class="banner-dots" id="bannerDots"></div>
      </div>
    </div>

    <!-- 快捷统计卡片 -->
    <div class="quick-stats" id="quickStats">
      <div class="qs-card" onclick="qsNavigate('all')" title="查看全部资源">
        <div class="qs-icon" style="background:linear-gradient(135deg,#667eea,#764ba2)"><i class="fas fa-file-lines"></i></div>
        <div class="qs-info"><div class="qs-num" id="qsTotal">0</div><div class="qs-label">全部资源</div></div>
        <i class="fas fa-chevron-right qs-arrow"></i>
      </div>
      <div class="qs-card" onclick="qsNavigate('downloads')" title="按下载量排序">
        <div class="qs-icon" style="background:linear-gradient(135deg,#f093fb,#f5576c)"><i class="fas fa-download"></i></div>
        <div class="qs-info"><div class="qs-num" id="qsDownloads">0</div><div class="qs-label">总下载量</div></div>
        <i class="fas fa-chevron-right qs-arrow"></i>
      </div>
      <div class="qs-card" onclick="qsNavigate('categories')" title="查看资料类别">
        <div class="qs-icon" style="background:linear-gradient(135deg,#4facfe,#00f2fe)"><i class="fas fa-tags"></i></div>
        <div class="qs-info"><div class="qs-num" id="qsCategories">0</div><div class="qs-label">资料类别</div></div>
        <i class="fas fa-chevron-right qs-arrow"></i>
      </div>
      <div class="qs-card" onclick="qsNavigate('recent')" title="查看近7日上传">
        <div class="qs-icon" style="background:linear-gradient(135deg,#43e97b,#38f9d7)"><i class="fas fa-clock"></i></div>
        <div class="qs-info"><div class="qs-num" id="qsRecent">0</div><div class="qs-label">近7日上传</div></div>
        <i class="fas fa-chevron-right qs-arrow"></i>
      </div>
    </div>

    <!-- 筛选 + 列表 -->
    <div class="content-body">
      <aside class="filter-panel" id="filterPanel">
        <div class="filter-section">
          <h4 class="filter-title"><i class="fas fa-tags"></i> 类别 <button class="filter-clear-btn" id="btnClearCategory">清空</button></h4>
          <div class="filter-body" id="filterCategories"></div>
        </div>
        <div class="filter-section">
          <h4 class="filter-title"><i class="fas fa-file"></i> 格式 <button class="filter-clear-btn" id="btnClearFormat">清空</button></h4>
          <div class="filter-body" id="filterFormats"></div>
        </div>
      </aside>

      <main class="resource-main">
        <div class="resource-toolbar">
          <div class="toolbar-left">
            <span class="result-info">共 <strong id="resultCount">0</strong> 条资源</span>
          </div>
          <div class="toolbar-right">
            <div class="sort-select">
              <select id="sortSelect">
                <option value="newest">最新上传</option>
                <option value="downloads">下载最多</option>
                <option value="name">名称排序</option>
              </select>
            </div>
            <div class="view-toggle">
              <button class="view-btn active" data-view="list" title="列表"><i class="fas fa-list"></i></button>
              <button class="view-btn" data-view="grid" title="网格"><i class="fas fa-grip"></i></button>
            </div>
          </div>
        </div>
        <div class="resource-list" id="resourceList"></div>
        <div class="load-more">
          <div class="pagination-info"></div>
          <button class="btn-load-more" id="btnLoadMore">加载更多</button>
        </div>
      </main>
    </div>
  </div>
</div>

<!-- 上传弹窗 -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal-container upload-modal">
    <div class="modal-header">
      <h3><i class="fas fa-cloud-upload-alt"></i> 上传资源</h3>
      <button class="modal-close" onclick="closeModal('uploadModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-zone-icon"><i class="fas fa-cloud-arrow-up"></i></div>
        <p>拖拽文件到此处，或 <label for="fileInput" class="upload-link">点击选择文件</label></p>
        <span>支持批量上传 · 自动识别文件类型并分类 · PDF/Word/Excel/PPT/视频/图片/压缩包</span>
        <input type="file" id="fileInput" multiple hidden>
      </div>
      <div class="upload-file-list" id="uploadFileList"></div>
      <div class="upload-form">
        <div class="form-row">
          <div class="form-group"><label>资源名称 <span class="required">*</span></label><input type="text" id="uploadName" placeholder="输入资源名称"></div>
          <div class="form-group"><label>版本号</label><input type="text" id="uploadVersion" placeholder="如 V2.0.0"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>所属产品 <span class="required">*</span></label><select id="uploadProduct"><option value="">请选择产品</option></select></div>
          <div class="form-group"><label>资料类别 <span class="required">*</span></label><select id="uploadCategory"><option value="">请选择类别</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>书架归属 <span class="required">*</span></label><select id="uploadShelf"><option value="">请选择书架</option></select></div>
          <div class="form-group"><label>文件格式</label><select id="uploadFormat"><option value="">自动识别</option></select></div>
        </div>
        <div class="form-group"><label>存储路径</label><input type="text" id="uploadPath" placeholder="/resources/" readonly></div>
        <div class="form-group"><label>资源描述</label><textarea id="uploadDesc" rows="3" placeholder="简要描述资源内容..."></textarea></div>
        <div class="form-group"><label>标签</label><div class="tag-input-wrapper" id="tagInputWrapper"><div class="tag-list" id="tagList"></div><input type="text" id="tagInput" placeholder="输入标签后按回车"></div></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('uploadModal')">取消</button>
      <button class="btn-primary" id="btnSubmitUpload"><i class="fas fa-upload"></i> 确认上传</button>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-container detail-modal">
    <div class="modal-header">
      <h3 id="detailTitle">资源详情</h3>
      <button class="modal-close" onclick="closeModal('detailModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('detailModal')">关闭</button>
      <button class="btn-primary" id="btnDetailDownload"><i class="fas fa-download"></i> 下载资源</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
